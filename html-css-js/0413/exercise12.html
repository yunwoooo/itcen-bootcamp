<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<script>
		const random = Math.floor(Math.random() * 3) + 1;
		let url;
		let siteName;
		
		if (random == 1) {
			siteName = "다음";
			url = "https://www.daum.net";
		} else if (random == 2) {
			siteName = "네이버";
			url = "https://www.naver.com";
		} else {
			siteName = "구글";
			url = "https://www.google.com"
		}
		const result = confirm(siteName + "(으)로 이동하시겠습니까?");
		if (result) {
		    location.href = url;
		} else {
		    location.href = "http://localhost:8088/edu/first.html";
		}
	</script>
</body>
</html>
