<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
  <head>
  <meta charset="UTF-8">
  <title>이벤트 처리 실습</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Gugi&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Gugi", sans-serif;
      text-align: center;
    }
    h1 {
      color: white;
      text-shadow: 2px 2px 4px gray;
      background: linear-gradient(to bottom, purple, pink, white);
      padding: 20px;
    }
    #btn-group {
      display: inline-flex;
      border: 2px solid purple;
      border-radius: 8px;
      overflow: hidden;
      margin: 20px;
    }
    #btn-group button {
      padding: 8px 16px;
      font-family: "Gugi", sans-serif;
      font-size: 16px;
      background-color: darkslateblue;
      color: white;
      text-shadow: 2px 2px 4px gray;
    }
    #btn-group button:hover {
      background-color: purple;
    }
    #weather-img {
      width: 200px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>이벤트 처리 실습</h1>
  <hr>
  <div id="btn-group">
    <button data-weather="sun">맑음</button>
    <button data-weather="cloud">흐림</button>
    <button data-weather="rain">비</button>
  </div>
  <hr>
  <br>
  <img id="weather-img" src="../../images/sun.png" alt="날씨 이미지">

  <script>
    function changeWeather(event) {
      const imageName = event.target.dataset.weather;
      if (imageName) {
        const dom = document.getElementById('weather-img');
        dom.src = '../../images/' + imageName + '.png';
      }
    }

    document.getElementById('btn-group').addEventListener('click', changeWeather);
  </script>
</body>
</html>
