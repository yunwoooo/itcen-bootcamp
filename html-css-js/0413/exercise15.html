<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
  <head>
  <meta charset="UTF-8">
  <title>이벤트 처리 실습</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Gugi&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Gugi", sans-serif;
      text-align: center;
    }
    h1 {
      color: white;
      text-shadow: 2px 2px 4px gray;
      background: linear-gradient(to bottom, skyblue, pink, white);
      padding: 20px;
    }
    #btn-group {
      display: inline-flex;
      border: 2px solid;
      border-radius: 8px;
      overflow: hidden;
      margin: 20px;
    }
    #btn-group button {
      padding: 8px 16px;
      font-family: "Gugi", sans-serif;
      font-size: 16px;
      background-color: skyblue;
      color: white;
      text-shadow: 2px 2px 4px gray;
    }
    #btn-group button:hover {
      background-color: pink;
    }
    #weather-img {
      width: 200px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <a href="https://ko.wikipedia.org/wiki/구구단 " style="text-decoration: none;">
  <h1>구구단</h1>
  </a>
  <div id="btn-group">
    <button data-dan ="1">1단</button>
    <button data-dan ="2">2단</button>
    <button data-dan ="3">3단</button>
    <button data-dan ="4">4단</button>
    <button data-dan ="5">5단</button>
    <button data-dan ="6">6단</button>
    <button data-dan ="7">7단</button>
    <button data-dan ="8">8단</button>
    <button data-dan ="9">9단</button>
  </div>
<div id="result"></div>

<script>
  const btn = document.getElementById('btn-group');
  const resultDiv = document.getElementById('result');

  btn.addEventListener('click', function(e) {
    if (e.target.tagName == 'BUTTON') {
      const dan = e.target.dataset.dan; 
      let output = `<h3>${dan}단</h3>`;

      for (let i = 1; i <= 9; i++) {
        output += `${dan} x ${i} = ${dan * i}<br>`;
      }
      resultDiv.innerHTML = output;
    }
  });
</script>
</body>
</html>
