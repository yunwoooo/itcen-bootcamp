<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	h1 {
    	text-shadow:1px -3px 8px #FF0;
    }
	input {
		height: 25px;
	 	border-radius : 20px;
	}
	button {
    	border-radius : 20px;
    }
</style>

</head>
<body>

<div class="container">
    <h1>회원 정보를 입력하십시오.</h1>
    <hr>

    <form action="/mvcedu/member" method ="POST">
        <input name="name" type="text" placeholder="이름을 입력하세요" ><br>
        <input name="number" type="text" placeholder="전화번호를 입력하세요"><br>
        <input name="id" type="text" placeholder="계정을 입력하세요" ><br>
        <input name="password" type="password" placeholder="패스워드를 입력하세요" ><br>

        <br>
        <button type="submit">등록</button>
        <button type="reset">재작성</button>
    </form>
</div>
</body>
</html>
