<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>visitor</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Gugi&display=swap" rel="stylesheet">
<style>
	body {
     	font-family: "Gugi", sans-serif;
    }
	h1 {
        text-align : center;
    	text-shadow:2px 2px 5px pink;
    }
	div {
		width : 70%;
		height : 30%;
		margin : 20px auto;
		padding-top : 30px;
		padding-bottom : 50px;
		padding-left : 50px;
		text-align : left;
		border-radius : 20px;
		background-image : linear-gradient(to top, yellow, white, pink);
	}
	.top {
            color : #cc0099;
    }
    button {
    	font-family: "Gugi", sans-serif;
    	border-radius : 20px;
    }
    input {
    	font-family: "Gugi", sans-serif;
    }
</style>
</head>
<body>
<h1>펜션 예약 서비스</h1>
<hr>

<div>
<form  method="post" action="/edu/reservation">
<label for=name>예약자명 : </label>
<input id=name name=name type=text required maxlength=4 required>
<br>
<br>
<label for=password>예약암호 : </label>
<input id=password name=password type=password required maxlength=20 required>
<br>
<br>
룸선택 : 
<input type="radio"  name="room" value="둘리">둘리
<input type="radio"  name="room" value="희동">희동
<input type="radio"   name="room" value="도우너">도우너
<input type="radio"   name="room" value="또치">또치 <br>

<br>
추가요청사항 : 
<input type="checkbox"  name="option" value="바베큐">바베큐
<input type="checkbox"  name="option" value="수영장">수영장
<input type="checkbox"  name="option" value="낚시">낚시
<input type="checkbox"  name="option" value="조식">조식 <br>
	<p>
		<label>예약날짜 : <input type="date"  name="date" />
		</label>
	</p>
<hr>
<button type="submit">보내기</button>
<button type="reset">다시작성하기</button>
</form>

</div>
</body>
</html>
